apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: elasticsearch-route
  namespace: elastic-stack
spec:
  parentRefs:
    - name: elastic-gateway
  hostnames:
    - "es.app.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: elasticsearch-es-http
          port: 9200
