apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit-role
rules:
  # 访问 Kubelet 所需的非资源 URL 权限
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
  # 访问核心 Kubernetes 资源的权限
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - pods/logs
      - nodes
      - nodes/proxy # 此项是访问 Kubelet 的关键
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit-role
subjects:
  - kind: ServiceAccount
    name: fluent-bit # 确保与你实际使用的 ServiceAccount 名称一致
    namespace: observability # 确保与 Fluent Bit 所在的命名空间一致
