apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: otel-collector-vpa
  namespace: observability
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    # 请用 kubectl get deploy -n observability 获取实际名称
    name: my-opentelemetry-operator
  updatePolicy:
    updateMode: InPlaceOrRecreate
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: "100m"
          memory: 256Mi
        maxAllowed:
          cpu: "1"
          memory: 1Gi
