# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-loki-logger
  namespace: default
  labels:
    app: test-loki-logger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-loki-logger
  template:
    metadata:
      labels:
        app: test-loki-logger
    spec:
      containers:
        - name: logger
          image: ccr.ccs.tencentyun.com/sumery/test-loki:test1
          # 替换为你构建的镜像，例如：docker.io/yourname/test-loki:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: COLLECTOR_ENDPOINT
              value: "192.168.3.100:30694"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command: ["sh", "-c", "echo 'OK'"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "echo 'READY'"]
            initialDelaySeconds: 3
            periodSeconds: 5
