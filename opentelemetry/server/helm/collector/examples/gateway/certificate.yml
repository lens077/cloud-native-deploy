apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: observability-gateway-tls
  namespace: observability
spec:
  # 证书存储在哪个 Secret
  isCA: false
  secretName: observability-root-ca-secret
  # 证书的颁发者是谁
  issuerRef:
    name: observability-internal-issuer
    # ClusterIssuer是集群级别的颁发者， 在全部命名空间生效
    # Issuer是命名空间的颁发者名，应用在哪个命名空间就在哪个命名空间生效，确保该命名空间存在该Issuer颁发者
    kind: Issuer
  commonName: observability.sumery.com
  # 给哪个域名颁发证书
  dnsNames:
    - "otlp-http.sumery.com"
    - "otlp-grpc.sumery.com"
    - "jaeger-grpc.sumery.com"
    - "jaeger-http.sumery.com"
    - "jaeger-ui.sumery.com"
    - "grafana.sumery.com"
