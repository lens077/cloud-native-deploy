apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: observability-root-ca
  namespace: observability
spec:
  isCA: true # 声明它是 CA
  commonName: observability-internal-root-ca
  secretName: observability-root-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: global-ca-issuer
    kind: ClusterIssuer
