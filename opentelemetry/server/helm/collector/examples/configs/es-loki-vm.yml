apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
  namespace: observability
spec:
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        send_batch_size: 1000
        timeout: 5s
      memory_limiter:
        check_interval: 1s
        limit_mib: 1000
        spike_limit_mib: 200
      k8s_attributes:
        extract:
          metadata:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.node.name
        passthrough: false

    exporters:
      # Metrics 导出到 VictoriaMetrics
      otlp_http/victoriametrics:
        endpoint: http://vm-single-victoria-metrics-single-server.victoriametrics.svc:8428/opentelemetry
        tls:
          insecure: true
        compression: gzip

      # Logs 导出到 Loki (注意：Loki 的 OTLP 端点通常为 /otlp/v1/logs, otel会自动添加/v1/logs后缀)
      otlp_http/loki:
        endpoint: http://loki.loki.svc.cluster.local:3100/otlp
        tls:
          insecure: true

    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8s_attributes, batch]
          exporters: [otlp_http/victoriametrics]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8s_attributes, batch]
          exporters: [otlp_http/loki]

      telemetry:
        metrics:
          level: detailed
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
