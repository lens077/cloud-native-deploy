apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
  namespace: observability
spec:
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      # 批处理器
      batch:
        # 避免每一条数据都发一个网络请求，从而降低 CPU 消耗和网络负载。
        # 减少网络请求次数，提高传输效率, 到达该参数的值才打包发送
        send_batch_size: 1000
        # 保证数据的实时性，防止在低流量时数据卡在内存里发不出去
        # 如果等待了设定的值还没攒满send_batch_size的值，不管有多少，直接强行发走
        timeout: 5s
      # 内存限制器
      memory_limiter:
        # 每隔 1 秒检查一次当前的内存占用情况。
        check_interval: 1s
        # 软限制（Soft Limit）为 设定值,单位MiB。
        limit_mib: 1000
        # 如果内存瞬间飙升超过 limit_mib + spike_limit_mib（即 设定的值,单位 MiB），会采取更激进的保护措施
        spike_limit_mib: 200
      k8s_attributes:
        extract:
          metadata:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.node.name
        passthrough: false

    exporters:
      # 把 trace 发送给 Jaeger 的 OTLP 端口
      otlp/jaeger:
        endpoint: jaeger.observability.svc:4317   # Jaeger 的 Service 名和端口
        tls:
          insecure: true   # 集群内通信一般无需 TLS

      # Metrics 导出到 VictoriaMetrics
      otlp_http/victoriametrics:
        endpoint: http://vm-single-victoria-metrics-single-server.victoriametrics.svc:8428/opentelemetry
        tls:
          insecure: true
        compression: gzip

      # Logs 导出到 Loki (注意：Loki 的 OTLP 端点通常为 /otlp/v1/logs, otel会自动添加/v1/logs后缀)
      otlp_http/loki:
        endpoint: http://loki.loki.svc.cluster.local:3100/otlp
        tls:
          insecure: true

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [ otlp ]
          processors: [ memory_limiter, k8s_attributes, batch ]
          exporters: [ otlp/jaeger ]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8s_attributes, batch]
          exporters: [otlp_http/victoriametrics]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8s_attributes, batch]
          exporters: [otlp_http/loki]

      telemetry:
        metrics:
          level: detailed
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
