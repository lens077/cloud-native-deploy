apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kafka-route
  namespace: kafka
spec:
  parentRefs:
    - name: kafka-gateway
      sectionName: https # 对应 Gateway 的监听器名称
  hostnames:
    - "kafka.sumery.com"
  rules:
    - backendRefs:
        - name: my-cluster-kafka-bootstrap
          port: 9092
