apiVersion: kafka.strimzi.io/v1
kind: KafkaConnect
metadata:
  name: my-connect-cluster
  namespace: kafka
  annotations:
    # 关键注解：启用 KafkaConnector CRD 来管理连接器
    strimzi.io/use-connector-resources: "true"
spec:
  # 赋予构建容器特权模式
  template:
    buildContainer:
      securityContext:
        privileged: true
        # 也可以不给全量特权，而是单独赋予底层操作所需的 Capabilities：
        # capabilities:
        #   add: ["SYS_ADMIN", "SETUID", "SETGID", "CHOWN"]
  version: 4.2.0
  replicas: 1
  # kafka bootstrap地址
  bootstrapServers: my-cluster-kafka-bootstrap:9092
  groupId: my-connect-cluster
  configStorageTopic: my-connect-cluster-configs
  statusStorageTopic: my-connect-cluster-status
  offsetStorageTopic: my-connect-cluster-offsets
  config:
    # 将内部主题的复制因子设为与 kafka broker 数量一致
    config.storage.replication.factor: 1
    offset.storage.replication.factor: 1
    status.storage.replication.factor: 1
  build:
    output:
      type: docker
      # 替换为你自己的私有镜像仓库地址，用于推送构建好的镜像
      image: ccr.ccs.tencentyun.com/sumery/strimzi-connect-debezium:3.5.1
      pushSecret: tcr-registry-secret
    plugins:
      - name: debezium-postgres-connector
        artifacts:
          - type: tgz
            # 从https://debezium.io/releases 获取版本和链接
#            url: https://repo1.maven.org/maven2/io/debezium/debezium-connector-postgres/3.5.1.Final/debezium-connector-postgres-3.5.1.Final-plugin.tar.gz
            url: https://repo1.maven.org/maven2/io/debezium/debezium-connector-postgres/3.6.0.Beta1/debezium-connector-postgres-3.6.0.Beta1-plugin.tar.gz
