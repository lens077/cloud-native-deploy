apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kafka-ui-route
  namespace: kafka
spec:
  parentRefs:
    - name: cilium-gateway
      sectionName: http # 对应 Gateway 的监听器名称
      namespace: default
  hostnames:
    - "kafka-ui.app.com"
    - "kui.app.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kafbat-ui-kafka-ui
          port: 80
